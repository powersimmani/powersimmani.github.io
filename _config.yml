# Site settings
title: Ho-min Park
email: homin.park@ghent.ac.kr
description: >-
  Computer Science PhD specializing in Machine Learning, Deep Learning,
  and AI applications in Medical Imaging, Bioinformatics, and Affective Computing.
baseurl: ""
url: "https://powersimmani.github.io"
github_username: powersimmani

# Author info
author:
  name: Ho-min Park
  avatar: "/assets/images/profile.jpg"
  bio: "PhD in Computer Science | Machine Learning Researcher"
  location: "Incheon, South Korea"
  email: "homin.park@ghent.ac.kr"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:homin.park@ghent.ac.kr"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/powersimmani"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=mFzW6LEAAAAJ"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0000-0001-9937-8617"

# Google Scholar settings
scholar:
  author_id: "mFzW6LEAAAAJ"

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes@4.24.0

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

# Minimal Mistakes theme settings
minimal_mistakes_skin: "default"

# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

# Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: ""  # Add your tracking ID

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - _scripts
  - "*.pdf"
